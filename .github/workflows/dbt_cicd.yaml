name: dbt CI/CD Deployment

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ vars.SNOWFLAKE_SCHEMA }}
      SNOWFLAKE_WAREHOUSE: ${{ vars.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_ROLE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dbt + Snowflake adapter
        run: |
          pip install dbt-snowflake

      - name: Write private key
        run: |
          cat << 'EOF' > /tmp/rsa_key.p8
          ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          EOF
          chmod 600 /tmp/rsa_key.p8

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          dbt_demo_project:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: "$SNOWFLAKE_ACCOUNT"
                user: "$SNOWFLAKE_USER"
                private_key_path: "/tmp/rsa_key.p8"
                authenticator: jwt
                role: "$SNOWFLAKE_ROLE"
                database: "$SNOWFLAKE_DATABASE"
                warehouse: "$SNOWFLAKE_WAREHOUSE"
                schema: "$SNOWFLAKE_SCHEMA"
                threads: 4
          EOF

      - name: Run dbt debug
        run: dbt debug --project-dir ./dbt_demo_project

      - name: Debug env variables
        run: |
          echo "DB: $SNOWFLAKE_DATABASE"
          echo "SCHEMA: $SNOWFLAKE_SCHEMA"
          echo "WH: $SNOWFLAKE_WAREHOUSE"
          echo "ROLE: $SNOWFLAKE_ROLE"

      - name: Run dbt models
        run: dbt run --project-dir ./dbt_demo_project

      - name: Run dbt tests
        run: dbt test --project-dir ./dbt_demo_project